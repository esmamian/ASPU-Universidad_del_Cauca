<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuestionario Comunicación Social y Periodismo</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="contenedor">
  <img src="Logo.png" alt="Logo ASPU" class="logo">
  <h1>Comunicación Social y Periodismo</h1>
  <h2 id="bienvenida"></h2>

  <form id="formulariocomunicacion">

    <button type="button" class="button1" onclick="window.location.href='principal.html'">
      Volver al menú
    </button>

    <!-- ITEM 1 -->
<div class="item">
  <div class="fila">

    <div class="texto">
      Productos certificados de investigación-creación
    </div>

    <div id="productoInvestigacion" class="cantidad">

      <label>¿Cuántos internacionales?</label>
      <input type="number" min="0" step="1" id="numProductoInvestigacionInter" name="numProductoInvestigacionInter" placeholder="0">

      <label>Año del más antiguo internacional</label>
      <input type="number" min="1900" max="2026" step="1" id="anoProductoInvestigacionInter" name="anoProductoInvestigacionInter" placeholder="0">

      <label>¿Cuántos nacionales?</label>
      <input type="number" min="0" step="1" id="numProductoInvestigacionNal" name="numProductoInvestigacionNal" placeholder="0">

      <label>Año del más antiguo nacional</label>
      <input type="number" min="1900" max="2026" step="1" id="anoProductoInvestigacionNal" name="anoProductoInvestigacionNal" placeholder="0">

      <label>¿Cuántos regional-local?</label>
      <input type="number" min="0" step="1" id="numProductoInvestigacionReg" name="numProductoInvestigacionReg" placeholder="0">

      <label>Año del más antiguo regional-local</label>
      <input type="number" min="1900" max="2026" step="1" id="anoProductoInvestigacionReg" name="anoProductoInvestigacionReg" placeholder="0">

    </div>

    <div class="opciones">
      <label>
        <input type="radio" name="productoInvestigacion" value="Sí" onclick="mostrarCantidad('productoInvestigacion')">
        Sí
      </label>

      <label>
        <input type="radio" name="productoInvestigacion" value="No" onclick="ocultarCantidad('productoInvestigacion')">
        No
      </label>
    </div>

  </div>
</div>

<!-- ITEM 2 -->
<div class="item">
  <div class="fila">

    <div class="texto">
      Productos certificados de comunicación y procesos organizacionales
    </div>

    <div id="productoComunicacion" class="cantidad">

      <label>¿Cuántos internacionales?</label>
      <input type="number" min="0" step="1" id="numProductoComunicacionInter" name="numProductoComunicacionInter" placeholder="0">

      <label>Año del más antiguo internacional</label>
      <input type="number" min="1900" max="2026" step="1" id="anoProductoComunicacionInter" name="anoProductoComunicacionInter" placeholder="0">

      <label>¿Cuántos nacionales?</label>
      <input type="number" min="0" step="1" id="numProductoComunicacionNal" name="numProductoComunicacionNal" placeholder="0">

      <label>Año del más antiguo nacional</label>
      <input type="number" min="1900" max="2026" step="1" id="anoProductoComunicacionNal" name="anoProductoComunicacionNal" placeholder="0">

      <label>¿Cuántos regional-local?</label>
      <input type="number" min="0" step="1" id="numProductoComunicacionReg" name="numProductoComunicacionReg" placeholder="0">

      <label>Año del más antiguo regional-local</label>
      <input type="number" min="1900" max="2026" step="1" id="anoProductoComunicacionReg" name="anoProductoComunicacionReg" placeholder="0">

    </div>

    <div class="opciones">
      <label>
        <input type="radio" name="productoComunicacion" value="Sí" onclick="mostrarCantidad('productoComunicacion')">
        Sí
      </label>

      <label>
        <input type="radio" name="productoComunicacion" value="No" onclick="ocultarCantidad('productoComunicacion')">
        No
      </label>
    </div>

  </div>
</div>

<!-- ITEM 3 -->
<div class="item">
  <div class="fila">

    <div class="texto">
      Premios certificados de periodismo y comunicación
    </div>

    <div id="premioPeriodismo" class="cantidad">

      <label>¿Cuántos internacionales?</label>
      <input type="number" min="0" step="1" id="numPremioPeriodismoInter" name="numPremioPeriodismoInter" placeholder="0">

      <label>Año del más antiguo internacional</label>
      <input type="number" min="1900" max="2026" step="1" id="anoPremioPeriodismoInter" name="anoPremioPeriodismoInter" placeholder="0">

      <label>¿Cuántos nacionales?</label>
      <input type="number" min="0" step="1" id="numPremioPeriodismoNal" name="numPremioPeriodismoNal" placeholder="0">

      <label>Año del más antiguo nacional</label>
      <input type="number" min="1900" max="2026" step="1" id="anoPremioPeriodismoNal" name="anoPremioPeriodismoNal" placeholder="0">

      <label>¿Cuántos regional-local?</label>
      <input type="number" min="0" step="1" id="numPremioPeriodismoReg" name="numPremioPeriodismoReg" placeholder="0">

      <label>Año del más antiguo regional-local</label>
      <input type="number" min="1900" max="2026" step="1" id="anoPremioPeriodismoReg" name="anoPremioPeriodismoReg" placeholder="0">

    </div>

    <div class="opciones">
      <label>
        <input type="radio" name="premioPeriodismo" value="Sí" onclick="mostrarCantidad('premioPeriodismo')">
        Sí
      </label>

      <label>
        <input type="radio" name="premioPeriodismo" value="No" onclick="ocultarCantidad('premioPeriodismo')">
        No
      </label>
    </div>

  </div>
</div>

    <button type="button" class="button1" onclick="window.location.href='principal.html'">
      Volver al menú
    </button>

    <button type="submit" class="button1">
      Guardar respuestas
    </button>

    <p id="mensaje"></p>

  </form>
</div>

<script>
let usuarioActual = null;

async function cargarUsuario() {
  const res = await fetch("/usuario");

  if (!res.ok) {
    window.location.href = "index.html";
    return;
  }

  usuarioActual = await res.json();

  document.getElementById("bienvenida").textContent =
    "Usuario: " + usuarioActual.usuario;
}

cargarUsuario();

function mostrarCantidad(id) {
  document.getElementById(id).style.display = "block";
}

function ocultarCantidad(id) {
  const contenedor = document.getElementById(id);
  contenedor.style.display = "none";

  const inputs = contenedor.querySelectorAll("input");

  inputs.forEach(input => {
    input.value = "";
  });
}

document.getElementById("formulariocomunicacion")
.addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!formularioCompleto(this)) {
  return;
}
  const datos = new FormData(this);

  function formularioCompleto(formulario) {

  const radios = {};

  formulario.querySelectorAll('input[type="radio"]')
  .forEach(radio => {
    radios[radio.name] = true;
  });

  for (let nombre in radios) {

    const seleccionado = formulario.querySelector(
      `input[name="${nombre}"]:checked`
    );

    if (!seleccionado) {

      alert(
        "Debe responder todas las preguntas antes de guardar."
      );

      return false;
    }

    if (seleccionado.value === "Sí") {

      const item = seleccionado.closest(".item");

      const inputs =
        item.querySelectorAll('input[type="number"]');

      let alMenosUno = false;

      for (let input of inputs) {

        if (
          input.value !== "" &&
          Number(input.value) > 0
        ) {
          alMenosUno = true;
        }
      }

      if (!alMenosUno) {

        alert(
          "Debe completar al menos una cantidad cuando responde Sí."
        );

        return false;
      }
    }
  }

  return true;
}


 const res = await fetch("/guardar-comunicacion", {

  method: "POST",

  headers: {
    "Content-Type": "application/json"
  },

  body: JSON.stringify({

    seccion: "Comunicación Social y Periodismo",

    productoInvestigacion:
      datos.get("productoInvestigacion"),

    cantidadProductoInvestigacionInter:
      datos.get("numProductoInvestigacionInter"),

    anoProductoInvestigacionInter:
      datos.get("anoProductoInvestigacionInter"),

    cantidadProductoInvestigacionNal:
      datos.get("numProductoInvestigacionNal"),

    anoProductoInvestigacionNal:
      datos.get("anoProductoInvestigacionNal"),

    cantidadProductoInvestigacionReg:
      datos.get("numProductoInvestigacionReg"),

    anoProductoInvestigacionReg:
      datos.get("anoProductoInvestigacionReg"),


    productoComunicacion:
      datos.get("productoComunicacion"),

    cantidadProductoComunicacionInter:
      datos.get("numProductoComunicacionInter"),

    anoProductoComunicacionInter:
      datos.get("anoProductoComunicacionInter"),

    cantidadProductoComunicacionNal:
      datos.get("numProductoComunicacionNal"),

    anoProductoComunicacionNal:
      datos.get("anoProductoComunicacionNal"),

    cantidadProductoComunicacionReg:
      datos.get("numProductoComunicacionReg"),

    anoProductoComunicacionReg:
      datos.get("anoProductoComunicacionReg"),


    premioPeriodismo:
      datos.get("premioPeriodismo"),

    cantidadPremioPeriodismoInter:
      datos.get("numPremioPeriodismoInter"),

    anoPremioPeriodismoInter:
      datos.get("anoPremioPeriodismoInter"),

    cantidadPremioPeriodismoNal:
      datos.get("numPremioPeriodismoNal"),

    anoPremioPeriodismoNal:
      datos.get("anoPremioPeriodismoNal"),

    cantidadPremioPeriodismoReg:
      datos.get("numPremioPeriodismoReg"),

    anoPremioPeriodismoReg:
      datos.get("anoPremioPeriodismoReg")

  })

});

  const data = await res.json();

  if (res.ok) {
    alert("Los datos se salvaron satisfactoriamente");
  } else {
    alert("Error: " + (data.detalle || data.mensaje));
  }

  document.getElementById("mensaje").textContent = data.mensaje;
});
</script>

</body>
</html>
