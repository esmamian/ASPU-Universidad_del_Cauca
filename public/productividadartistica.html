<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuestionario ASPU - Universidad del Cauca</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="contenedor">
  <h1>Productividad Artística</h1>
  <img src="Logo.png" alt="Logo ASPU" class="logo">
  <h2 id="bienvenida"></h2>

  
  <button  class="button1" onclick="window.location.href = 'principal.html'";>
     Volver al menú
  </button>

  <div class="menu">
    <a href="artesplasticas.html">Artes Plásticas</a>
    <a href="diseno.html">Diseño</a>
    <a href="musica.html">Música</a>
    <a href="comunicacionsocial.html">Comunicación Social y Periodismo</a>
  </div>
  

</div>


<script>
let usuarioActual = null;

async function cargarUsuario() {
  const res = await fetch("/usuario");

  if (!res.ok) {
    window.location.href = "index.html";
    return;
  }

  usuarioActual = await res.json();

  document.getElementById("bienvenida").textContent =
    "Usuario: " + usuarioActual.usuario;

  if (usuarioActual.rol === "admin") {
    document.getElementById("btnExcel").style.display = "inline-block";
  }
}

cargarUsuario();

</script>
</body>
</html>
