<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuestionario ASPU - Universidad del Cauca</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="contenedor">
  <h1>Menú principal</h1>
  <img src="Logo.png" alt="Logo ASPU" class="logo">
  <h2 id="bienvenida"></h2>

  <div class="menu">
    <a href="informaciongeneral.html">1.0 Información General
      <br>
    <a href="formacionacademica.html">1.1 Formación Académica
      <br>
      1.2 Experiencia 
      <br>
      1.3 Productividad Académica</a>
    <a href="productividadartistica.html">1.4 Productividad Artística (si aplica)</a>
  </div>

  <button  class="button1" onclick="logout()">
     Cerrar sesión
  </button>
  
<button 
  id="btnExcel" 
  class=button1 
  style="display:none;" 
  onclick="descargarExcel()">
  
  Descargar Excel 
</button>
  
<button
  id="btnArtes"
  class="button1"
  style="display:none"
  onclick="window.location.href='/descargar-artes'">

  Descargar Artes Plásticas
</button>

<button
  id="btnComunicacion"
  class="button1"
  style="display:none"
  onclick="window.location.href='/descargar-comunicacion'">

  Descargar Comunicación
</button>

<button
  id="btnMusica"
  class="button1"
  style="display:none"
  onclick="window.location.href='/descargar-musica'">

  Descargar Música
</button>

<button
  id="btnDiseno"
  class="button1"
  style="display:none"
  onclick="window.location.href='/descargar-diseno'">

  Descargar Diseño
</button>

<button
  id="btnEncabezado"
  class="button1"
  style="display:none"
  onclick="window.location.href='/descargar-encabezado'">
  Descargar Información General
</button>  

</div>

  
<script>
let usuarioActual = null;

async function cargarUsuario() {

  const res = await fetch("/usuario");

  if (!res.ok) {
    window.location.href = "index.html";
    return;
  }

  usuarioActual = await res.json();

  document.getElementById("bienvenida").textContent =
    "Usuario: " + usuarioActual.usuario;

  // SOLO ADMIN VE LOS BOTONES
  if (usuarioActual.rol === "admin") {
    document.getElementById("btnEncabezado").style.display = "inline-block";

    document.getElementById("btnExcel")
      .style.display = "inline-block";

    document.getElementById("btnArtes")
      .style.display = "inline-block";

    document.getElementById("btnComunicacion")
      .style.display = "inline-block";

    document.getElementById("btnMusica")
      .style.display = "inline-block";

    document.getElementById("btnDiseno")
      .style.display = "inline-block";
  }
}

function descargarExcel() {
  window.location.href = "/descargar-excel";
}
  
  async function logout() {
  await fetch("/logout", { method: "POST" });
  window.location.href = "index.html";
}

cargarUsuario();

</script>
</body>
</html>
