<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuestionario Música</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<div class="contenedor">
  <img src="Logo.png" alt="Logo ASPU" class="logo">
  <h1>Música</h1>
  <h2 id="bienvenida"></h2>

  <form id="formulariomusica">

    <button type="button" class="button1" onclick="window.location.href='principal.html'">
      Volver al menú
    </button>

    <!-- ITEM 1 -->
    <div class="item">
      <div class="fila">

        <div class="texto">
          Creaciones o composiciones certificadas
        </div>

        <div id="obraMusical" class="cantidad">
          <label>¿Cuántas internacional?</label>
          <input type="number" min="0" step="1" id="numObraMusicalInter" name="numObraMusicalInter" placeholder="0">
          <label>Año del más antiguo</label>
          <input type="number" min="0" step="1" id="anoObraMusicalInter" name="anoObraMusicalInter" placeholder="0">
      

          <label>¿Cuántas nacionales?</label>
          <input type="number" min="0" step="1" id="numObraMusicalNal" name="numObraMusicalNal" placeholder="0">
          <label>Año del más antiguo</label>
          <input type="number" min="0" step="1" id="anoObraMusicalNal" name="anoObraMusicalNal" placeholder="0">
      
        </div>

        <div class="opciones">
          <label>
            <input type="radio" name="obraMusical" value="Sí" onclick="mostrarCantidad('obraMusical')">
            Sí
          </label>

          <label>
            <input type="radio" name="obraMusical" value="No" onclick="ocultarCantidad('obraMusical')">
            No
          </label>
        </div>

      </div>
    </div>

    <!-- ITEM 2 -->
    <div class="item">
      <div class="fila">

        <div class="texto">
          Arreglos musicales certificados
        </div>

        <div id="obraMusicalPremiada" class="cantidad">
          <label>¿Cuántas internacional?</label>
          <input type="number" min="0" step="1" id="numObraMusicalPremiadaInter" name="numObraMusicalPremiadaInter" placeholder="0">
          
          <label>Año del más antiguo</label>
          <input type="number" min="0" step="1" id="anoObraMusicalPremiadaInter" name="anoObraMusicalPremiadaInter" placeholder="0">

          <label>¿Cuántas nacional?</label>
          <input type="number" min="0" step="1" id="numObraMusicalPremiadaNal" name="numObraMusicalPremiadaNal" placeholder="0">
          
          <label>Año del más antiguo</label>
          <input type="number" min="0" step="1" id="anoObraMusicalPremiadaNal" name="anoObraMusicalPremiadaNal" placeholder="0">
        </div>

        <div class="opciones">
          <label>
            <input type="radio" name="obraMusicalPremiada" value="Sí" onclick="mostrarCantidad('obraMusicalPremiada')">
            Sí
          </label>

          <label>
            <input type="radio" name="obraMusicalPremiada" value="No" onclick="ocultarCantidad('obraMusicalPremiada')">
            No
          </label>
        </div>

      </div>
    </div>

    <!-- ITEM 2 -->
<div class="item">
  <div class="fila">

    <div class="texto">
      Premios certificados
    </div>

    <div id="premiosMusica" class="cantidad">

      <label>¿Cuántos internacionales?</label>
      <input
        type="number"
        min="0"
        step="1"
        id="numPremiosMusicaInter"
        name="numPremiosMusicaInter"
        placeholder="0">

      <label>Año del más antiguo</label>
      <input
        type="number"
        min="0"
        step="1"
        id="anoPremiosMusicaInter"
        name="anoPremiosMusicaInter"
        placeholder="0">

      <label>¿Cuántos nacionales?</label>
      <input
        type="number"
        min="0"
        step="1"
        id="numPremiosMusicaNal"
        name="numPremiosMusicaNal"
        placeholder="0">

      <label>Año del más antiguo</label>
      <input
        type="number"
        min="0"
        step="1"
        id="anoPremiosMusicaNal"
        name="anoPremiosMusicaNal"
        placeholder="0">

    </div>

    <div class="opciones">
      <label>
        <input
          type="radio"
          name="premiosMusica"
          value="Sí"
          onclick="mostrarCantidad('premiosMusica')">
        Sí
      </label>

      <label>
        <input
          type="radio"
          name="premiosMusica"
          value="No"
          onclick="ocultarCantidad('premiosMusica')">
        No
      </label>
    </div>

  </div>
</div>


<!-- ITEM 3 -->
<div class="item">
  <div class="fila">

    <div class="texto">
      Interpretación certificada como solista, en recital, en música de cámara y/o como director
    </div>

    <div id="interpretacionMusica" class="cantidad">

      <label>¿Cuántas en evento internacional?</label>
      <input
        type="number"
        min="0"
        step="1"
        id="numInterpretacionMusicaInter"
        name="numInterpretacionMusicaInter"
        placeholder="0">

      <label>Año de la más antigua</label>
      <input
        type="number"
        min="0"
        step="1"
        id="anoInterpretacionMusicaInter"
        name="anoInterpretacionMusicaInter"
        placeholder="0">

      <label>¿Cuántas en evento nacional?</label>
      <input
        type="number"
        min="0"
        step="1"
        id="numInterpretacionMusicaNal"
        name="numInterpretacionMusicaNal"
        placeholder="0">

      <label>Año de la más antigua</label>
      <input
        type="number"
        min="0"
        step="1"
        id="anoInterpretacionMusicaNal"
        name="anoInterpretacionMusicaNal"
        placeholder="0">

    </div>

    <div class="opciones">
      <label>
        <input
          type="radio"
          name="interpretacionMusica"
          value="Sí"
          onclick="mostrarCantidad('interpretacionMusica')">
        Sí
      </label>

      <label>
        <input
          type="radio"
          name="interpretacionMusica"
          value="No"
          onclick="ocultarCantidad('interpretacionMusica')">
        No
      </label>
    </div>

  </div>
</div>
    

    <button type="button" class="button1" onclick="window.location.href='principal.html'">
      Volver al menú
    </button>

    <button type="submit" class="button1">
      Guardar respuestas
    </button>

    <p id="mensaje"></p>

  </form>
</div>

<script>
let usuarioActual = null;

async function cargarUsuario() {
  const res = await fetch("/usuario");

  if (!res.ok) {
    window.location.href = "index.html";
    return;
  }

  usuarioActual = await res.json();

  document.getElementById("bienvenida").textContent =
    "Usuario: " + usuarioActual.usuario;
}

cargarUsuario();

function mostrarCantidad(id) {
  document.getElementById(id).style.display = "block";
}

function ocultarCantidad(id) {
  const contenedor = document.getElementById(id);
  contenedor.style.display = "none";

  const inputs = contenedor.querySelectorAll("input");

  inputs.forEach(input => {
    input.value = "";
  });
}

function formularioCompleto(formulario) {
  const radios = {};

  formulario.querySelectorAll('input[type="radio"]').forEach(radio => {
    radios[radio.name] = true;
  });

  for (let nombre in radios) {
    const seleccionado = formulario.querySelector(
      `input[name="${nombre}"]:checked`
    );

    if (!seleccionado) {
      alert("Debe responder todas las preguntas antes de guardar.");
      return false;
    }

    if (seleccionado.value === "Sí") {
      const item = seleccionado.closest(".item");
      const inputs = item.querySelectorAll('input[type="number"]');

      let alMenosUno = false;

      for (let input of inputs) {
        if (input.value !== "" && Number(input.value) > 0) {
          alMenosUno = true;
        }
      }

      if (!alMenosUno) {
        alert("Debe completar al menos una cantidad cuando responde Sí.");
        return false;
      }
    }
  }

  return true;
}

document.getElementById("formulariomusica")
.addEventListener("submit", async function(e) {
  e.preventDefault();

  if (!formularioCompleto(this)) {
    return;
  }

  const datos = new FormData(this);

  const res = await fetch("/guardar-musica", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      seccion: "Música",

      obraMusical: datos.get("obraMusical"),
      cantidadObraMusicalInter: datos.get("numObraMusicalInter"),
      anoObraMusicalInter: datos.get("anoObraMusicalInter"),
      cantidadObraMusicalNal: datos.get("numObraMusicalNal"),
      anoObraMusicalNal: datos.get("anoObraMusicalNal"),

      obraMusicalPremiada: datos.get("obraMusicalPremiada"),
      cantidadObraMusicalPremiadaInter: datos.get("numObraMusicalPremiadaInter"),
      anoObraMusicalPremiadaInter: datos.get("anoObraMusicalPremiadaInter"),
      cantidadObraMusicalPremiadaNal: datos.get("numObraMusicalPremiadaNal"),
      anoObraMusicalPremiadaNal: datos.get("anoObraMusicalPremiadaNal"),

      premiosMusica: datos.get("premiosMusica"),
      cantidadPremiosMusicaInter: datos.get("numPremiosMusicaInter"),
      anoPremiosMusicaInter: datos.get("anoPremiosMusicaInter"),
      cantidadPremiosMusicaNal: datos.get("numPremiosMusicaNal"),
      anoPremiosMusicaNal: datos.get("anoPremiosMusicaNal"),

      interpretacionMusica: datos.get("interpretacionMusica"),
      cantidadInterpretacionMusicaInter: datos.get("numInterpretacionMusicaInter"),
      anoInterpretacionMusicaInter: datos.get("anoInterpretacionMusicaInter"),
      cantidadInterpretacionMusicaNal: datos.get("numInterpretacionMusicaNal"),
      anoInterpretacionMusicaNal: datos.get("anoInterpretacionMusicaNal")
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Los datos se salvaron satisfactoriamente");
  } else {
    alert("Error: " + (data.detalle || data.mensaje));
  }

  document.getElementById("mensaje").textContent = data.mensaje;
});
</script>

</body>
</html>
